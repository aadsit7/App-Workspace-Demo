<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast — Application Workspace Demo</title>

    <meta name="color-scheme" content="dark light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      :root {
        --bg-main: radial-gradient(1200px 700px at 18% 0%, rgba(37,99,235,0.08), transparent 58%),
                    radial-gradient(900px 560px at 92% 28%, rgba(16,185,129,0.05), transparent 60%),
                    linear-gradient(180deg, #fbfdff 0%, #f7f8fb 55%, #f9fafb 100%);
        --text-primary: #0f172a;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --radius: 1rem;
        --border-subtle: #e2e8f0;
        --shadow-card: 0 2px 10px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.04);
        --shadow-hover: 0 14px 36px rgba(15,23,42,0.10), 0 4px 12px rgba(15,23,42,0.06);
        --shadow-elevated: 0 28px 70px rgba(15,23,42,0.18), 0 10px 24px rgba(15,23,42,0.10);
        --re-green: #10b981;
      }
      html, body {
        background: var(--bg-main);
        background-attachment: fixed;
        color: var(--text-primary);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; }
      .focus-ring:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

      /* Cards */
      .card { border-radius: var(--radius); background: rgba(255,255,255,0.92); border: 1px solid rgba(226,232,240,0.70); box-shadow: var(--shadow-card); transition: box-shadow 300ms ease, transform 300ms ease; }
      .card:hover { box-shadow: var(--shadow-hover); }
      .card-lift:hover { transform: translateY(-3px); }
      .sub-card { border-radius: calc(var(--radius) / 1.5); border: 1px solid var(--border-subtle); background: #f9fafb; transition: box-shadow 300ms ease; }
      .glass { background: rgba(255,255,255,0.72) !important; border: 1px solid rgba(255,255,255,0.55); box-shadow: var(--shadow-elevated) !important; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }

      /* Force cards */
      .force-card { position: relative; overflow: hidden; border-radius: var(--radius); transition: all 250ms cubic-bezier(0.2,0.8,0.2,1); }
      .force-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--force-color, transparent); opacity: 0; transition: opacity 250ms ease; }
      .force-card:hover::before, .force-card[aria-pressed="true"]::before { opacity: 1; }
      .force-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(15,23,42,0.12); }

      /* Chart */
      .chart-container { width: 100%; height: auto; aspect-ratio: 900 / 500; }
      #capacity-gap-chart { width: 100%; height: 100%; overflow: visible; }
      .chart-axis { stroke: #cbd5e1; stroke-width: 1.5; }
      .chart-axis-label { font-size: 13px; font-weight: 600; fill: #0A1C60; letter-spacing: 0.02em; }
      .chart-year-label { font-size: 12px; fill: #64748b; font-weight: 600; }
      .chart-grid-line { stroke: #f1f5f9; stroke-width: 1; stroke-dasharray: 6 6; }
      .chart-annotation { font-size: 14px; font-weight: 700; fill: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; }
      .demand-line { stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 2px 6px rgba(239,68,68,0.25)); }
      .capacity-line { stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 2px 6px rgba(59,130,246,0.25)); }
      .marker-group { cursor: pointer; transition: transform 160ms ease, filter 160ms ease; }
      .marker-group:hover { filter: drop-shadow(0 10px 18px rgba(37,99,235,0.22)); transform: translateY(-1px) scale(1.02); }
      .chart-el { opacity: 0; animation: chartIn 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards; }
      @keyframes chartIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

      /* Flow animations */
      .flow-bar { height: 0.22rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .flow-bar { animation: barGrow 0.9s ease forwards var(--d, 0s); }
      @keyframes barGrow { to { transform: scaleX(1); } }
      .bolt-line { width: 0.22rem; border-radius: 2px; transform-origin: top center; transform: scaleY(0); }
      .run .bolt-line { animation: boltDrop 0.9s ease forwards var(--d, 0s); }
      @keyframes boltDrop { to { transform: scaleY(1); } }
      .tile { width: 0.45rem; height: 0.45rem; border-radius: 2px; background: #e5e7eb; opacity: 0.9; }
      .run .tile { animation: tilePulse 1s ease-in-out var(--d, 0s) 1 forwards; }
      @keyframes tilePulse { 0% { transform: scale(0.7); background: #e5e7eb; opacity: 0.4; } 60% { transform: scale(1); background: var(--primary); opacity: 1; } 100% { background: #e5e7eb; opacity: 0.9; } }
      .logo-ring { width: 2.1rem; height: 2.1rem; border-radius: 9999px; display: grid; place-items: center; background: #ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); transition: all 0.3s ease; }
      .logo-ring:hover { box-shadow: 0 0 8px rgba(37,99,235,0.3); transform: scale(1.05); }
      .logo-wrap { display: flex; align-items: center; gap: 0.4rem; position: relative; transition: all 300ms ease; }
      .logo-name { font-size: 0.7rem; color: #6b7280; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; }
      .show-labels .logo-wrap { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .show-labels .logo-name { opacity: 1; transform: translateX(0); white-space: normal; text-align: left; }
      .show-labels .logo-wrap .logo-ring { width: 1.8rem; height: 1.8rem; }
      .run .logo-ring { animation: appLift 1.2s cubic-bezier(0.2,0.8,0.2,1) var(--d, 0s) 1 forwards; }
      @keyframes appLift { 0% { transform: translateY(0) scale(1); filter: saturate(0.4); opacity: 0.65; } 30% { transform: translateY(-4px) scale(1.05); } 60% { transform: translateY(-2px) scale(1.02); filter: saturate(1); opacity: 1; } 100% { transform: translateY(0) scale(1); } }
      .env-wrap { display: flex; align-items: center; gap: 0.2rem; position: relative; transition: all 300ms ease; width: calc(16.666% - 0.5rem); flex-direction: column; }
      .env-name { font-size: 0.7rem; color: #6b7280; opacity: 1; transition: all 0.3s ease; white-space: nowrap; text-align: center; }
      .env-ring { width: 1.8rem; height: 1.8rem; }
      .run .env-ring { animation: envPulse 1.2s cubic-bezier(0.2,0.8,0.2,1) var(--d, 0s) 1 forwards; }
      @keyframes envPulse { 0% { transform: scale(1); filter: saturate(0.4); opacity: 0.65; } 30% { transform: scale(1.05); box-shadow: 0 0 12px rgba(37,99,235,0.5); } 60% { transform: scale(1.02); filter: saturate(1); opacity: 1; } 100% { transform: scale(1); } }
      .arrow-line { height: 1.5rem; width: 0.15rem; background: linear-gradient(to bottom, #2563eb, #e5e7eb); transform-origin: top center; transform: scaleY(0); margin: 0 auto; position: relative; }
      .arrow-line::after { content: ''; position: absolute; bottom: -0.3rem; left: -0.25rem; border-left: 0.4rem solid transparent; border-right: 0.4rem solid transparent; border-top: 0.6rem solid #1d4ed8; opacity: 0; transition: opacity 0.3s; }
      .run .arrow-line { animation: arrowDrop 0.8s ease forwards var(--d, 0s); }
      .run .arrow-line::after { animation: arrowTip 0.8s ease forwards var(--d, 0s); }
      @keyframes arrowDrop { to { transform: scaleY(1); } }
      @keyframes arrowTip { 0% { opacity: 0; } 80% { opacity: 0; } 100% { opacity: 1; } }
      .hub-card { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
      .run .hub-card { animation: hubAppear 0.8s ease forwards var(--d, 0.5s); }
      @keyframes hubAppear { to { opacity: 1; transform: translateY(0); } }
      .metrics-banner { opacity: 0; transform: translateY(10px); }
      .run .metrics-banner { animation: metricsIn 0.8s ease forwards var(--d, 3.5s); }
      @keyframes metricsIn { to { opacity: 1; transform: translateY(0); } }
      .cat-row { display: grid; grid-template-columns: 15ch 1fr; gap: 0.5rem; align-items: center; border-top: 1px solid #e5e7eb; padding-top: 0.5rem; transition: all 300ms ease; }
      .cat-row:first-child { border-top: none; padding-top: 0; }
      .cat-title { font-size: 0.7rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.5rem; }
      .meta-label { font-size: 0.6rem; color: #6b7280; opacity: 0; transform: translateY(5px); transition: all 0.3s ease; display: flex; flex-direction: column; gap: 0.1rem; }
      .show-labels .meta-label { opacity: 1; transform: translateY(0); }
      .show-labels .cat-row { grid-template-columns: 15ch 1fr; gap: 1rem; }
      .show-labels #flowCard .flex-wrap { gap: 1rem; }
      .show-labels .logo-wrap { width: calc(33.333% - 0.666rem); margin-bottom: 0.5rem; }
      .check-appear { opacity: 0; animation: fadeInOut 1.5s ease var(--d,0s) forwards; }
      @keyframes fadeInOut { 0% { opacity:0 } 30% { opacity:1 } 70% { opacity:1 } 100% { opacity:0 } }
      .flow-connect { background-image: linear-gradient(to right, transparent 50%, #e5e7eb 50%); background-size: 4px 1px; background-repeat: repeat-x; height: 1px; opacity: 0.5; }
      .end-user-expand { transition: all 0.5s ease; transform: scale(1.05); background: #ffffff; border-color: #10b981; }
      .icon-launch { animation: iconLaunch 0.5s ease forwards; }
      @keyframes iconLaunch { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
      .tagline-fade { opacity: 0; animation: fadeIn 1s ease 10s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
      .overlay-tag { opacity: 0; transition: opacity 0.3s ease; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(255,255,255,0.9); padding: 1rem; border-radius: var(--radius); box-shadow: var(--shadow-card); z-index: 10; }
      .show-labels .overlay-tag { opacity: 1; transition-delay: 0.5s; }

      /* Modals */
      .modal-overlay { transition: opacity 300ms ease; background: rgba(2,6,23,0.55) !important; }
      .modal-content { transition: transform 300ms cubic-bezier(0.2,0.8,0.2,1), opacity 300ms ease; box-shadow: var(--shadow-elevated) !important; }

      /* Buttons */
      .btn-primary { background: var(--primary); color: #fff; border: 0; border-radius: 9999px; padding: 0.625rem 1.75rem; font-weight: 600; font-size: 0.875rem; transition: all 0.2s ease; cursor: pointer; }
      .btn-primary:hover { background: var(--primary-hover); transform: scale(1.02); }
      .btn-secondary { background: transparent; color: #0A1C60; border: 2px solid #cbd5e1; border-radius: 9999px; padding: 0.5rem 1.5rem; font-weight: 600; font-size: 0.875rem; transition: all 0.2s ease; cursor: pointer; }
      .btn-secondary:hover { color: var(--primary); border-color: var(--primary); transform: scale(1.02); }

      @media (prefers-reduced-motion: reduce) {
        .marker-group, .card, .logo-ring, .force-card { transition: none !important; animation: none !important; }
      }
    </style>
  </head>

      function logo(name,letter,color){ return { name, svg: mark(letter,color) }; }
      function mark(letter,color){
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24" role="img" aria-label="${letter}">
          <defs><linearGradient id="g${letter.replace(/\W/g,'')}" x1="0" x2="1"><stop offset="0" stop-color="${shade(color,.9)}"/><stop offset="1" stop-color="${shade(color,1.1)}"/></linearGradient></defs>
          <rect x="1.5" y="1.5" width="45" height="45" rx="12" fill="url(#g${letter.replace(/\W/g,'')})" stroke="rgba(0,0,0,.15)"/>
          <text x="50%" y="56%" text-anchor="middle" font-size="22" font-family="Inter" font-weight="800" fill="#0A1C60">${letter}</text>
        </svg>`;
      }
      function multiLogo(name,colors){
        const slices=colors.map((c,i)=>`<rect x="${4+i*9}" y="8" width="7" height="32" rx="4" fill="${c}"></rect>`).join('');
        return { name, svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24"><rect x="1.5" y="1.5" width="45" height="45" rx="12" fill="#F7F9FB" stroke="rgba(0,0,0,.15)"/>${slices}</svg>` };

                </label>

                <label class="flex flex-col gap-1">
                  <span class="text-sm font-medium text-[#0A1C60]">Average IT admin salary (USD/year)</span>
                  <span class="text-xs text-[#4A5568]">Used to calculate the dollar value of time saved.</span>
                  <input type="number" id="calc-salary" min="50000" max="300000" step="5000" value="${STATE.calcInputs.salary}"
                    class="mt-1 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm focus-ring">
                  <span class="text-[11px] text-[#9ca3af] italic">Typical range: $90,000-$130,000</span>
                </label>

                <button type="button" data-action="calculate-impact" class="btn-primary">Calculate</button>
              </div>

              <div class="card p-6 flex flex-col gap-4" id="calc-output-panel">
                ${r ? renderCalcResult() : `
                  <div class="flex flex-col items-center justify-center h-full gap-3 py-12 text-center">
                    <div class="h-14 w-14 rounded-2xl bg-[#0070F3]/5 grid place-items-center">
                      <i data-lucide="calculator" class="w-7 h-7 text-[#0070F3]"></i>
                    </div>
                    <p class="text-sm text-[#4A5568]">Fill in your numbers and hit Calculate.</p>
                    <p class="text-xs text-[#94a3b8]">Your results will appear here.</p>
                  </div>
                `}
              </div>
            </div>

            <div class="rounded-xl border border-slate-200 bg-white/60 p-3 text-[11px] text-[#9ca3af] leading-relaxed">
              <strong class="text-[#6b7280]">How this works:</strong> Hours saved = time currently spent repackaging the same app for each platform. With Application Workspace, that work happens once. Dollar values use your salary input. FTE shows recovered capacity — not a headcount reduction suggestion.
            </div>

            <!-- Edit button at bottom -->
            <div class="flex justify-start">
              <button type="button" data-action="open-editor"
                class="inline-flex items-center gap-2 btn-secondary">
                <i data-lucide="edit-3" class="w-4 h-4"></i> Edit Current State
              </button>
            </div>
          </div>`;
      }

      function renderCalcResult(){
        const r = STATE.calcResult;
        if (!r) return '';
        const qualified = r.envs >= 2 && r.changes >= 5;
        const fmtDollar = n => '$' + Math.abs(Math.round(n)).toLocaleString();
        const fmtHr = n => Math.round(n).toLocaleString();

        return `
          <div class="rounded-xl bg-gradient-to-br from-[#0070F3] to-[#0A1C60] p-5 text-white">
            <div class="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">Hours Saved Per Year</div>
            <div class="text-[36px] font-extrabold tabular-nums leading-none">${fmtHr(r.h_saved_year)}</div>
            <div class="text-sm opacity-75 mt-1">hours your team stops spending on repeat work</div>
          </div>

          <div class="grid grid-cols-3 gap-2">
            <div class="rounded-xl bg-blue-50 border border-blue-100 p-3 text-center">
              <div class="text-[10px] uppercase tracking-widest text-[#1d4ed8] font-bold mb-1">Per Month</div>
              <div class="text-lg font-bold text-[#0A1C60] tabular-nums">${fmtHr(r.h_saved)} hrs</div>
              <div class="text-[10px] text-[#6b7280] mt-0.5">${fmtDollar(r.dollar_month)}</div>
            </div>
            <div class="rounded-xl bg-green-50 border border-green-100 p-3 text-center">
              <div class="text-[10px] uppercase tracking-widest text-[#059669] font-bold mb-1">Per Year</div>
              <div class="text-lg font-bold text-[#059669] tabular-nums">${fmtHr(r.h_saved_year)} hrs</div>
              <div class="text-[10px] text-[#6b7280] mt-0.5">${fmtDollar(r.dollar_year)}</div>
            </div>
            <div class="rounded-xl bg-orange-50 border border-orange-100 p-3 text-center">
              <div class="text-[10px] uppercase tracking-widest text-[#c2410c] font-bold mb-1">FTE Equiv.</div>
              <div class="text-lg font-bold text-[#c2410c] tabular-nums">${r.fte_eq}</div>
              <div class="text-[10px] text-[#6b7280] mt-0.5">capacity returned</div>
            </div>
          </div>

          <div class="rounded-xl bg-slate-50 border border-slate-200 p-4 space-y-2">
            <div class="text-[10px] font-bold uppercase tracking-widest text-[#6b7280]">The Math</div>
            <div class="text-[12px] text-[#4A5568] space-y-1">
              <div>Today: <strong>${r.changes} changes x ${r.envs} platforms x ${r.time} hrs = ${fmtHr(r.h_current)} hrs/mo</strong></div>
              <div>With Recast: <strong>${r.changes} changes x 1 platform x ${r.time} hrs = ${fmtHr(r.h_aw)} hrs/mo</strong></div>
              <div>Hourly rate: <strong>${fmtDollar(r.hourlyRate)}/hr</strong> (${fmtDollar(r.salary)}/yr / 2,080 hrs)</div>
            </div>
          </div>

          ${qualified ? `
            <div class="rounded-xl bg-green-50 border border-green-200 p-3 flex items-start gap-2">
              <i data-lucide="check-circle" class="w-4 h-4 text-[#059669] flex-shrink-0 mt-0.5"></i>
              <p class="text-[12px] text-[#065f46]"><strong>Strong fit.</strong> Multiple platforms and regular changes mean the repeated work is adding up every month.</p>
            </div>
          ` : `
            <div class="rounded-xl bg-amber-50 border border-amber-200 p-3 flex items-start gap-2">
              <i data-lucide="alert-triangle" class="w-4 h-4 text-[#d97706] flex-shrink-0 mt-0.5"></i>
              <p class="text-[12px] text-[#92400e]">Smaller environment — but savings grow as platform count does.</p>
            </div>
          `}`;
      }

      function calculateImpact(){
        const envs    = Math.max(1, STATE.calcInputs.envs);
        const changes = Math.max(0, STATE.calcInputs.changes);
        const time    = Math.max(0, STATE.calcInputs.time);
        const salary  = Math.max(0, STATE.calcInputs.salary || 110000);
        const hourlyRate = salary / 2080;
        const h_current = changes * envs * time;
        const h_aw = changes * 1 * time;
        const h_saved = changes * (envs - 1) * time;
        const h_saved_year = h_saved * 12;
        const fte_eq = round(h_saved_year / 1920);
        const dollar_month = Math.round(h_saved * hourlyRate);
        const dollar_year = Math.round(h_saved_year * hourlyRate);
        STATE.calcResult = { envs, changes, time, salary, hourlyRate, h_current, h_aw, h_saved, h_saved_year, fte_eq, dollar_month, dollar_year };
      }

      /* ═══════════════════════════════════════════
         CHART RENDERING
         ═══════════════════════════════════════════ */

      function renderChart(){
        const svg = document.getElementById('capacity-gap-chart');
        if (!svg) return;
        svg.innerHTML = '';
        svg.setAttribute('viewBox', '0 0 900 500');

        const width = 680, height = 340, margin = {left: 80, bottom: 70, top: 40, right: 100};
        const xScale = t => margin.left + t * width;
        const yScale = v => margin.top + height - v * height;

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
          <linearGradient id="demandG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f87171"/><stop offset="50%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
          <linearGradient id="capG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#60a5fa"/><stop offset="50%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
          <linearGradient id="gapG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(239,68,68,0.06)"/><stop offset="50%" stop-color="rgba(168,85,247,0.04)"/><stop offset="100%" stop-color="rgba(59,130,246,0.06)"/></linearGradient>
          <filter id="mGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/><feFlood flood-color="#2563eb" flood-opacity="0.35"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="lShadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/></filter>
        `;
        svg.appendChild(defs);

        // Grid
        const gridG = makeG(svg, 'chart-el'); gridG.style.animationDelay = '0s';
        let gridH = '';
        for (let i = 0; i <= 4; i++) { const y = yScale(i/4); gridH += '<line x1="'+margin.left+'" y1="'+y+'" x2="'+(margin.left+width)+'" y2="'+y+'" class="chart-grid-line"/>'; }
        gridG.innerHTML = gridH;

        // X axis
        const xA = makeG(svg, 'chart-el'); xA.style.animationDelay = '0s';
        xA.innerHTML = '<line x1="'+margin.left+'" y1="'+(margin.top+height)+'" x2="'+(margin.left+width)+'" y2="'+(margin.top+height)+'" class="chart-axis"/>' +
          '<text x="'+(margin.left+width/2)+'" y="'+(margin.top+height+52)+'" text-anchor="middle" class="chart-axis-label">'+STATE.chartConfig.xAxis+'</text>' +
          STATE.years.map((yr,i) => { const x = xScale(i/3); return '<line x1="'+x+'" y1="'+(margin.top+height)+'" x2="'+x+'" y2="'+(margin.top+height+8)+'" stroke="#94a3b8" stroke-width="1.5"/><text x="'+x+'" y="'+(margin.top+height+26)+'" text-anchor="middle" class="chart-year-label">'+yr+'</text>'; }).join('');

        // Y axis
        const yA = makeG(svg, 'chart-el'); yA.style.animationDelay = '0s';
        yA.innerHTML = '<line x1="'+margin.left+'" y1="'+margin.top+'" x2="'+margin.left+'" y2="'+(margin.top+height)+'" class="chart-axis"/>' +
          '<text x="'+(margin.left-45)+'" y="'+(margin.top+height/2)+'" text-anchor="middle" class="chart-axis-label" transform="rotate(-90,'+(margin.left-45)+','+(margin.top+height/2)+')">'+STATE.chartConfig.yAxis+'</text>';

        const exp = STATE.currentDemandExponent;
        const slope = STATE.currentCapacitySlope;

        let dPath = 'M '+xScale(0)+' '+yScale(0);
        let cPath = 'M '+xScale(0)+' '+yScale(0.3);
        const dPts = [], cPts = [];

        for (let i = 0; i <= 100; i++) {
          const t = i/100;
          const dem = Math.pow(t, exp);
          const cap = 0.3 + slope * t;
          dPath += ' L '+xScale(t)+' '+yScale(dem);
          cPath += ' L '+xScale(t)+' '+yScale(cap);
          dPts.push({x: xScale(t), y: yScale(dem)});
          cPts.push({x: xScale(t), y: yScale(cap)});
        }

        // Gap fill
        const gapP = dPts.map(p=>'L '+p.x+' '+p.y).join(' ') + cPts.slice().reverse().map(p=>'L '+p.x+' '+p.y).join(' ') + 'Z';
        const gap = makePath(svg, 'M '+dPts[0].x+' '+dPts[0].y+' '+gapP, 'url(#gapG)', 'chart-el');
        gap.style.animationDelay = '0.5s';

        // Lines
        const dLine = makeLine(svg, dPath, 'url(#demandG)', 'demand-line chart-el'); dLine.style.animationDelay = '0.3s';
        const cLine = makeLine(svg, cPath, 'url(#capG)', 'capacity-line chart-el'); cLine.style.animationDelay = '0.3s';

        // Gap label
        const gL = makeG(svg, 'chart-el'); gL.style.animationDelay = '1s';
        gL.innerHTML = '<text x="'+xScale(0.55)+'" y="'+yScale(0.45)+'" text-anchor="middle" class="chart-annotation">'+STATE.chartConfig.center+'</text>';

        // Legend
        const lG = makeG(svg, 'chart-el'); lG.style.animationDelay = '1s';
        const lx = margin.left + width - 190, ly = margin.top - 8;
        lG.innerHTML = '<rect x="'+(lx-12)+'" y="'+(ly-14)+'" width="210" height="30" rx="8" fill="rgba(255,255,255,0.85)" stroke="rgba(226,232,240,0.6)" stroke-width="1"/>' +
          '<line x1="'+lx+'" y1="'+ly+'" x2="'+(lx+24)+'" y2="'+ly+'" stroke="url(#demandG)" stroke-width="3" stroke-linecap="round"/>' +
          '<text x="'+(lx+30)+'" y="'+(ly+4)+'" font-size="11" font-weight="600" fill="#dc2626" font-family="Inter">Demand</text>' +
          '<line x1="'+(lx+100)+'" y1="'+ly+'" x2="'+(lx+124)+'" y2="'+ly+'" stroke="url(#capG)" stroke-width="3" stroke-linecap="round"/>' +
          '<text x="'+(lx+130)+'" y="'+(ly+4)+'" font-size="11" font-weight="600" fill="#2563eb" font-family="Inter">Capacity</text>';

        // Line end labels
        const dEndY = yScale(Math.pow(1, exp));
        const cEndY = yScale(0.3 + slope);
        const eG = makeG(svg, 'chart-el'); eG.style.animationDelay = '1s';
        eG.innerHTML = '<rect x="'+(xScale(1)+8)+'" y="'+(dEndY-12)+'" width="76" height="22" rx="6" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.20)" stroke-width="1"/>' +
          '<circle cx="'+(xScale(1)+20)+'" cy="'+dEndY+'" r="3" fill="#ef4444"/>' +
          '<text x="'+(xScale(1)+28)+'" y="'+(dEndY+4)+'" font-size="11" font-weight="700" fill="#dc2626" font-family="Inter">Demand</text>' +
          '<rect x="'+(xScale(1)+8)+'" y="'+(cEndY-12)+'" width="76" height="22" rx="6" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.20)" stroke-width="1"/>' +
          '<circle cx="'+(xScale(1)+20)+'" cy="'+cEndY+'" r="3" fill="#3b82f6"/>' +
          '<text x="'+(xScale(1)+28)+'" y="'+(cEndY+4)+'" font-size="11" font-weight="700" fill="#2563eb" font-family="Inter">Capacity</text>';

        // Driver markers
        const markerData = [];
        STATE.drivers.forEach(d => {
          if (d.markerYear && (d.state === 'normal' || d.state === 'accelerating')) {
            const t = (d.markerYear - 2025) / 3;
            markerData.push({driver: d, t, x: xScale(t), y: yScale(Math.pow(t, exp))});
          }
        });
        markerData.sort((a, b) => a.y - b.y);
        const labelPos = [];

        markerData.forEach(({driver: d, x, y}) => {
          const isHot = STATE.highlightDriverId === d.id;
          const emph = isHot ? 9 : (d.state === 'accelerating' ? 7 : 5);
          const dot = d.state === 'accelerating' ? '#ef4444' : '#2563eb';
          const filt = isHot ? 'filter="url(#mGlow)"' : '';
          const label = d.label.length > 22 ? d.label.substring(0, 21) + '\u2026' : d.label;
          let lx = x + 14, ly = y + 4, anchor = 'start';
          if (x > margin.left + width * 0.7) { lx = x - 14; anchor = 'end'; }
          for (const prev of labelPos) { if (Math.abs(ly - prev.y) < 18 && Math.abs(lx - prev.x) < 120) ly = prev.y + 20; }
          labelPos.push({x: lx, y: ly});
          const conn = Math.abs(ly - y) > 10 ? '<line x1="'+x+'" y1="'+y+'" x2="'+lx+'" y2="'+(ly-4)+'" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 2"/>' : '';

          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.classList.add('marker-group', 'chart-el');
          g.style.animationDelay = '0.8s';
          g.setAttribute('role', 'button'); g.setAttribute('tabindex', '0');
          g.setAttribute('aria-label', 'Learn more about ' + d.label);
          g.innerHTML = '<title>'+d.short+'</title><circle cx="'+x+'" cy="'+y+'" r="18" fill="transparent"/>' +
            '<circle cx="'+x+'" cy="'+y+'" r="'+(emph+3)+'" fill="'+dot+'" fill-opacity="0.12"/>' +
            '<circle cx="'+x+'" cy="'+y+'" r="'+emph+'" fill="'+dot+'" stroke="white" stroke-width="2.5" '+filt+'/>' +
            conn +
            '<rect x="'+(anchor==='end'?lx-label.length*7-10:lx-6)+'" y="'+(ly-13)+'" width="'+(label.length*7+16)+'" height="22" rx="6" fill="white" fill-opacity="0.92" stroke="'+dot+'" stroke-width="0.8" stroke-opacity="0.25" filter="url(#lShadow)"/>' +
            '<text x="'+lx+'" y="'+(ly+1)+'" text-anchor="'+anchor+'" font-size="11" font-weight="600" fill="#1e293b" font-family="Inter">'+label+'</text>';
          g.addEventListener('click', () => openInsight(d));
          g.addEventListener('keydown', e => { if (e.key === 'Enter') openInsight(d); });
          svg.appendChild(g);
        });

        // Tipping point
        if (STATE.showTippingPoint) {
          const t = (STATE.tippingPointYear - 2025) / 3;
          const x = xScale(t);
          const tpLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          tpLine.setAttribute('x1', x); tpLine.setAttribute('y1', yScale(0));
          tpLine.setAttribute('x2', x); tpLine.setAttribute('y2', yScale(1));
          tpLine.setAttribute('stroke', '#ef4444'); tpLine.setAttribute('stroke-width', '1.5');
          tpLine.setAttribute('stroke-dasharray', '6 4'); tpLine.setAttribute('stroke-opacity', '0.7');
          tpLine.classList.add('chart-el'); tpLine.style.animationDelay = '0.3s';
          svg.appendChild(tpLine);

          const bG = makeG(svg, 'chart-el'); bG.style.animationDelay = '1s';
          bG.innerHTML = '<rect x="'+(x-60)+'" y="'+(yScale(1)-30)+'" width="120" height="26" rx="13" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>' +
            '<circle cx="'+(x-40)+'" cy="'+(yScale(1)-17)+'" r="3" fill="#ef4444"/>' +
            '<text x="'+(x+4)+'" y="'+(yScale(1)-13)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" font-family="Inter" letter-spacing="0.05em">Inflection Point</text>';

          if (STATE.chartConfig.tipping) {
            const words = STATE.chartConfig.tipping.split(' ');
            const lines = []; let cur = '';
            words.forEach(w => { if ((cur+' '+w).trim().length > 20) { lines.push(cur.trim()); cur = w; } else { cur = (cur+' '+w).trim(); } });
            if (cur.trim()) lines.push(cur.trim());
            const annG = makeG(svg, 'chart-el'); annG.style.animationDelay = '1.2s';
            const boxH = lines.length * 14 + 12;
            const boxY = yScale(0.85);
            const boxX = x > margin.left + width / 2 ? x - 145 : x + 10;
            let annH = '<rect x="'+boxX+'" y="'+boxY+'" width="135" height="'+boxH+'" rx="6" fill="white" fill-opacity="0.9" stroke="#fecaca" stroke-width="1"/>';
            lines.forEach((ln, i) => { annH += '<text x="'+(boxX+10)+'" y="'+(boxY+16+i*14)+'" font-size="11" fill="#b91c1c" font-family="Inter" font-weight="500">'+ln+'</text>'; });
            annG.innerHTML = annH;
          }

          const hit = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          hit.setAttribute('role', 'button'); hit.setAttribute('tabindex', '0');
          hit.innerHTML = '<rect x="'+(x-15)+'" y="'+(yScale(1)-30)+'" width="30" height="'+(height+40)+'" fill="transparent"/>';
          hit.addEventListener('click', () => openInsight(STATE.tippingPoint));
          hit.addEventListener('keydown', e => { if (e.key === 'Enter') openInsight(STATE.tippingPoint); });
          svg.appendChild(hit);
        }
      }

      function makeG(svg, cls) { const g = document.createElementNS('http://www.w3.org/2000/svg', 'g'); if (cls) cls.split(' ').forEach(c => g.classList.add(c)); svg.appendChild(g); return g; }
      function makePath(svg, d, fill, cls) { const p = document.createElementNS('http://www.w3.org/2000/svg', 'path'); p.setAttribute('d', d); p.setAttribute('fill', fill); if (cls) cls.split(' ').forEach(c => p.classList.add(c)); svg.appendChild(p); return p; }
      function makeLine(svg, d, stroke, cls) { const p = document.createElementNS('http://www.w3.org/2000/svg', 'path'); p.setAttribute('d', d); p.setAttribute('stroke', stroke); p.setAttribute('fill', 'none'); if (cls) cls.split(' ').forEach(c => p.classList.add(c)); svg.appendChild(p); return p; }

      function updateCurves(){
        if (STATE.recastMode) { STATE.targetDemandExponent = 1.55; STATE.targetCapacitySlope = 0.18; STATE.showTippingPoint = false; return; }
        let nN = 0, nA = 0;
        STATE.drivers.forEach(d => { if (d.state === 'normal') nN++; if (d.state === 'accelerating') nA++; });
        STATE.targetDemandExponent = 1.6 + (nN * 0.15 + nA * 0.3);
        STATE.targetDemandExponent = Math.min(Math.max(STATE.targetDemandExponent, 1.2), 3);
        STATE.targetCapacitySlope = 0;
        STATE.showTippingPoint = nA >= 3;
      }

      function animateCurves(){
        STATE.currentDemandExponent += (STATE.targetDemandExponent - STATE.currentDemandExponent) * 0.1;
        STATE.currentCapacitySlope += (STATE.targetCapacitySlope - STATE.currentCapacitySlope) * 0.1;
        renderChart();
        if (Math.abs(STATE.currentDemandExponent - STATE.targetDemandExponent) > 0.001 ||
            Math.abs(STATE.currentCapacitySlope - STATE.targetCapacitySlope) > 0.001) {
          requestAnimationFrame(animateCurves);
        }
      }

      function openInsight(content){ STATE.insightContent = content; STATE.highlightDriverId = content?.id || null; render(); }

      /* ═══════════════════════════════════════════
         FLOW VISUALIZATION (Tab 2)
         ═══════════════════════════════════════════ */

      function renderFlow(){
        return `
          <div class="card p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-2">
                <div class="h-6 w-6 rounded-[2px] grid place-items-center bg-[#0A1C60]"><i data-lucide="boxes" class="h-3.5 w-3.5 text-white"></i></div>
                <div>
                  <h3 class="text-base font-semibold">Application Workspace</h3>
                  <div class="text-[12px] text-[#4A5568]">Define apps once — delivered automatically to every platform</div>
                </div>
              </div>
              <div class="flex items-center gap-2 text-[12px]">
                <button type="button" class="btn-secondary text-xs px-2.5 py-1" data-action="toggle-labels">${STATE.showLabels?'Hide':'Show'} labels</button>
                <button type="button" data-action="start-flow" class="btn-primary text-xs px-2.5 py-1.5">Start</button>
                <button type="button" data-action="reset-flow" class="btn-secondary text-xs px-2.5 py-1.5">Reset</button>
              </div>
            </div>

            <div id="envFlow" class="mt-3 sub-card p-3 relative bg-gradient-to-b from-white to-slate-50 shadow-inner rounded-xl border border-slate-200/50 ${STATE.showLabels ? 'show-labels' : ''}">
              <div id="envHub" class="hub-card sub-card p-3 text-center bg-gradient-to-r from-[#0A1C60] to-[#0070F3] text-white mb-2 rounded-xl">
                <div class="flex items-center justify-center gap-2">
                  <i data-lucide="server" class="w-4 h-4 text-white"></i>
                  <span class="text-sm font-semibold">Application Workspace</span>
                </div>
                <div class="text-[10px] opacity-75 mt-0.5">Define once here — delivered everywhere below</div>
              </div>

              <div id="envArrows" class="grid grid-cols-6 gap-2 mt-1 mb-1">
                ${ENV_DESTINATIONS.map((_,i) => '<div class="arrow-line" style="--d:'+(0.5+i*0.15)+'s"></div>').join('')}

      /* ═══════════════════════════════════════════
         FLOW BUILD & ANIMATION FUNCTIONS
         ═══════════════════════════════════════════ */

      function buildFlow(){
        let base=0;
        CATALOG.forEach(section=>{
          const mount=document.getElementById(section.id); if(!mount) return;
          mount.innerHTML='';
          section.items.forEach((itm,idx)=>{
            const wrap=document.createElement('div'); wrap.className='logo-wrap';
            wrap.style.setProperty('--d',(base+idx*0.2+4).toFixed(2)+'s');
            const ring=document.createElement('div'); ring.className='logo-ring';
            ring.innerHTML=itm.svg; ring.title=itm.name;
            ring.setAttribute('role','img'); ring.setAttribute('aria-label',itm.name);
            wrap.appendChild(ring);
            if(STATE.showLabels){
              const label=document.createElement('span'); label.className='logo-name'; label.textContent=itm.name; wrap.appendChild(label);
              const meta=document.createElement('div'); meta.className='meta-label';
              meta.innerHTML='<span>Stage: '+itm.config.stage+'</span><span>Policy: '+itm.config.policy+'</span><span>Region: '+itm.config.region+'</span><span>Device: '+itm.config.device+'</span>';
              wrap.appendChild(meta);
            }
            mount.appendChild(wrap);
          });
          base+=1.5;
        });
        buildTiles(document.getElementById('flowConnA'),14,7);
        buildTiles(document.getElementById('flowConnB'),14,7.5);
        buildTiles(document.getElementById('flowConnC'),14,8);
        buildTiles(document.getElementById('flowGrpA'),18,9);
        buildTiles(document.getElementById('flowGrpB'),18,9.5);
        buildTiles(document.getElementById('flowGrpC'),18,10);
        buildTiles(document.getElementById('flowDevA'),10,12);
        buildTiles(document.getElementById('flowDevB'),10,12.5);
        buildTiles(document.getElementById('flowDevC'),10,13);

        const avatar=document.getElementById('endUserAvatar');
        const badge=document.getElementById('endUserBadge');
        if(avatar){ avatar.style.background='#EA4335'; avatar.style.color='#fff'; avatar.textContent='U'; }
        if(badge){ badge.textContent='!'; badge.style.background='#E11D48'; badge.style.opacity='0'; }
        const msg=document.getElementById('endUserMessage'); if(msg) msg.textContent='Right app, right device — automatically. No ticket required.';
        document.getElementById('miniWorkspace')?.classList.add('hidden');
        document.getElementById('progressCounters')?.classList.add('hidden');
        document.getElementById('flowCard')?.classList.remove('run');
        document.getElementById('envFlow')?.classList.remove('run');
        if(STATE.showLabels){ document.getElementById('flowCard')?.classList.add('show-labels'); document.getElementById('envFlow')?.classList.add('show-labels'); }
        else { document.getElementById('flowCard')?.classList.remove('show-labels'); document.getElementById('envFlow')?.classList.remove('show-labels'); }
        document.getElementById('endUserCard')?.classList.remove('end-user-expand');
        STATE.progress={apps:0,time:0,tickets:0}; STATE.envProgress={appsProcessed:0};
        updateProgress(); updateEnvProgress();
        document.getElementById('flowSuccess')?.classList.add('hidden');
      }

      function buildTiles(c,count,baseDelay){
        if(!c) return; c.innerHTML='';
        for(let i=0;i<count;i++){ const d=document.createElement('div'); d.className='tile'; d.style.setProperty('--d',(baseDelay+i*0.1).toFixed(2)+'s'); c.appendChild(d); }
      }

      function clearFlowTimers(){
        if(!STATE.flowTimers) STATE.flowTimers={intervals:[],timeouts:[]};
        STATE.flowTimers.intervals.forEach(id=>clearInterval(id));
        STATE.flowTimers.timeouts.forEach(id=>clearTimeout(id));
        STATE.flowTimers.intervals=[]; STATE.flowTimers.timeouts=[];
      }

      function startFlow(){
        clearFlowTimers();
        const envCard=document.getElementById('envFlow'); const card=document.getElementById('flowCard');
        if(!envCard||!card) return;
        envCard.classList.remove('run'); card.classList.remove('run');
        void envCard.offsetWidth; void card.offsetWidth;
        envCard.classList.add('run'); card.classList.add('run');

        const flash=document.getElementById('flowHubFlash');
        const success=document.getElementById('flowSuccess');
        const avatar=document.getElementById('endUserAvatar');
        const badge=document.getElementById('endUserBadge');
        const mini=document.getElementById('miniWorkspace');
        const counters=document.getElementById('progressCounters');
        const endCard=document.getElementById('endUserCard');

        if(flash){ flash.classList.remove('hidden'); STATE.flowTimers.timeouts.push(setTimeout(()=>flash.classList.add('hidden'),2000)); }
        success?.classList.add('hidden');
        counters?.classList.remove('hidden');

        const envInt=setInterval(updateEnvProgress,50);
        STATE.flowTimers.intervals.push(envInt);

        STATE.flowTimers.timeouts.push(setTimeout(()=>{
          clearInterval(envInt);
          const progInt=setInterval(updateProgress,100);
          STATE.flowTimers.intervals.push(progInt);
          STATE.flowTimers.timeouts.push(setTimeout(()=>{
            if(avatar){ avatar.style.background='var(--re-green)'; avatar.style.color='#fff'; }
            if(badge){ badge.textContent='\u2713'; badge.style.background='var(--re-green)'; badge.style.color='#fff'; badge.style.opacity='1'; }
            mini?.classList.remove('hidden');
            endCard?.classList.add('end-user-expand');
            success?.classList.remove('hidden');
            clearInterval(progInt);
          },7000));
        },4000));

        STATE.flowTimers.timeouts.push(setTimeout(()=>{ envCard.classList.remove('run'); card.classList.remove('run'); },16000));
      }

      function updateProgress(){
        if(STATE.progress.apps<128) STATE.progress.apps+=4;
        if(STATE.progress.time<46) STATE.progress.time+=2;
        if(STATE.progress.tickets<73) STATE.progress.tickets+=3;
        setText('appsProcessed',Math.min(STATE.progress.apps,128));
        setText('timeSaved',Math.min(STATE.progress.time,46));
        setText('ticketsAvoided',Math.min(STATE.progress.tickets,73));
      }

      function updateEnvProgress(){
        if(STATE.envProgress.appsProcessed<5000) STATE.envProgress.appsProcessed+=125;
        setText('appsProcessedCounter', STATE.envProgress.appsProcessed>=5000?'5,000':STATE.envProgress.appsProcessed);
      }

      function resetFlow(){
        clearFlowTimers();
        STATE.progress={apps:0,time:0,tickets:0};
        STATE.envProgress={appsProcessed:0};
        STATE.showLabels=false;
        buildFlow();
      }

      function toggleOverlay(){
        const o=document.getElementById('overlayTag');
        if(!o) return;
        if(STATE.showLabels){ o.classList.remove('hidden'); setTimeout(()=>o.classList.add('hidden'),3000); }
      }

      const whyOrder = ['change', 'now', 'recast'];

      function renderWhyModal(){
        if(!STATE.openWhyModal) return '';
        const id = STATE.openWhyModal;
        const iconMap = { change: 'alert-triangle', now: 'clock-4', recast: 'sparkles' };
        const labelMap = { change: 'Why Change', now: 'Why Now', recast: 'Why Recast' };
        const data = STATE.currentState[id];
        const cidx = whyOrder.indexOf(id);
        const prev = cidx > 0 ? whyOrder[cidx-1] : null;
        const next = cidx < whyOrder.length-1 ? whyOrder[cidx+1] : null;

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay" role="dialog" aria-modal="true" data-action="close-on-backdrop">
            <div class="w-full max-w-4xl mx-4 rounded-2xl overflow-hidden modal-content glass" data-modal-inner="1">
              <div class="bg-white/40 backdrop-blur-lg px-8 py-6 flex items-center justify-between" style="border-bottom:1px solid var(--border-subtle)">
                <div class="flex items-center gap-3">

                  ${data.bullets.map(b=>'<div class="bg-white/70 backdrop-blur-lg p-4 rounded-lg shadow-sm flex items-start gap-3 hover:shadow-md transition-shadow"><i data-lucide="check-circle" class="w-5 h-5 text-[#0070F3] flex-shrink-0 mt-0.5"></i><p class="text-base leading-relaxed text-[#4A5568]">'+b+'</p></div>').join('')}
                </div>
                <div class="mt-6 bg-white/70 backdrop-blur-lg p-4 rounded-lg shadow-sm flex items-start gap-3">
                  <i data-lucide="lightbulb" class="w-5 h-5 text-amber-400 flex-shrink-0 mt-0.5"></i>

      const USER_ID = String(window.APP_USER_ID || "guest");

      function parseLines(s, max){ max = max || 5; return (s || '').split('\n').map(l => l.trim()).filter(Boolean).slice(0, max); }

      function renderEditModal(){

      function editorChartSection(){
        const buffer = STATE.editChartBuffer || { chartConfig: {...STATE.chartConfig}, drivers: STATE.drivers.map(d=>({label:d.label,bullets:d.bullets.join('\n')})) };
        const conf = buffer.chartConfig || {};
        const drv = buffer.drivers || [];
        let html = '<div class="flex flex-col gap-4"><span class="text-sm font-bold">XY Chart</span>';
        ['yAxis','xAxis','center','tipping'].forEach(k => {
          const labels = {yAxis:'Y-axis label',xAxis:'X-axis label',center:'Center text',tipping:'Tipping point annotation'};
          html += '<label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">'+labels[k]+'</span><input id="chart-'+k+'" value="'+(conf[k]??STATE.chartConfig[k])+'" class="rounded-lg border border-slate-200 bg-white p-3 text-sm focus-ring"/></label>';
        });
        html += '<div class="space-y-4">';
        STATE.drivers.forEach((d,i) => {
          const dBuf = drv[i] || {};
          html += '<div><label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Point '+(i+1)+' title</span><input id="driver'+i+'-label" value="'+(dBuf.label??d.label)+'" class="rounded-lg border border-slate-200 bg-white p-3 text-sm focus-ring"/></label>' +
            '<label class="flex flex-col gap-1 mt-2"><span class="text-xs text-[#4A5568]">Point '+(i+1)+' bullets (one per line, exactly 3)</span><textarea id="driver'+i+'-bullets" rows="4" class="min-h-[100px] rounded-lg border border-slate-200 bg-white p-3 text-sm focus-ring">'+(dBuf.bullets??d.bullets.join('\n'))+'</textarea></label></div>';
        });
        html += '</div></div>';
        return html;
      }

      function readFields(){
        const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
        return {
          change: { intro: g('changeIntro'), bullets: g('changeBullets'), analyst: g('changeAnalyst') },
          now: { intro: g('nowIntro'), bullets: g('nowBullets'), analyst: g('nowAnalyst') },
          recast: { intro: g('recastIntro'), bullets: g('recastBullets'), analyst: g('recastAnalyst') }
        };
      }

      function readChartFieldsRaw(){
        const g = id => { const el = document.getElementById(id); return el ? el.value : undefined; };
        return {
          chartConfig: { yAxis: g('chart-yAxis'), xAxis: g('chart-xAxis'), center: g('chart-center'), tipping: g('chart-tipping') },
          drivers: STATE.drivers.map((_,i) => ({ label: g('driver'+i+'-label'), bullets: g('driver'+i+'-bullets') }))
        };
      }

      function loadDraft(){ try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; }catch{return null;} }
      function saveDraft(p){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(p)); }catch{} }
      function clearDraft(){ try{ localStorage.removeItem(STORAGE_KEY); }catch{} }

      function initEditor(){
        const draft = loadDraft();
        if(draft){
          ['change','now','recast'].forEach(k=>{
            const iEl=document.getElementById(k+'Intro'), bEl=document.getElementById(k+'Bullets'), aEl=document.getElementById(k+'Analyst');
            if(iEl) iEl.value = draft[k]?.intro ?? '';
            if(bEl) bEl.value = draft[k]?.bullets ?? '';
            if(aEl) aEl.value = draft[k]?.analyst ?? '';
          });
          STATE.editChartBuffer = { chartConfig: draft.chartConfig || {}, drivers: draft.drivers || [] };
        } else {
          STATE.editChartBuffer = { chartConfig: {...STATE.chartConfig}, drivers: STATE.drivers.map(d=>({label:d.label,bullets:d.bullets.join('\n')})) };
        }
      }

      /* ═══════════════════════════════════════════
         EVENT SYSTEM
         ═══════════════════════════════════════════ */

      function attachEvents(){
        const root = document.getElementById('app');
        if (!root || root.dataset.bound === '1') return;
        root.dataset.bound = '1';

        root.addEventListener('click', (e) => {
          const act = e.target.closest('[data-action]');
          const action = act?.getAttribute('data-action');
          if (!action) return;

          if (action === 'switch-tab') {
            STATE.activeTab = act.getAttribute('data-tab');
            STATE.visitedCards = []; STATE.calcResult = null;
            STATE.openWhyModal = null; STATE.insightContent = null;
            STATE.activeForce = null; STATE.highlightDriverId = null;
            render(); return;
          }

          if (action === 'advance') {
            STATE.activeTab = act.getAttribute('data-next');
            STATE.openWhyModal = null;
            render(); return;
          }

          if (action === 'select-force') {
            const fid = act.getAttribute('data-force');
            const force = FORCES.find(f => f.id === fid);
            if (!force) return;
            if (STATE.activeForce === fid) {
              STATE.activeForce = null; STATE.recastMode = false;
              STATE.drivers.forEach(d => d.state = 'accelerating');
              STATE.showTippingPoint = true;
              updateCurves();
              STATE.currentDemandExponent = STATE.targetDemandExponent;
              STATE.currentCapacitySlope = STATE.targetCapacitySlope;
              render(); return;
            }
            STATE.activeForce = fid; STATE.recastMode = false;
            STATE.drivers.forEach(d => { d.state = force.drivers.includes(d.id) ? 'accelerating' : 'off'; });
            STATE.showTippingPoint = true;
            updateCurves(); requestAnimationFrame(animateCurves);
            openInsight({ id: force.id, title: force.title, short: force.tagline, bullets: force.bullets, closing: force.closing });
            return;
          }

          if (action === 'clear-force') {
            STATE.activeForce = null; STATE.recastMode = false;
            STATE.drivers.forEach(d => d.state = 'accelerating');
            STATE.showTippingPoint = true;
            updateCurves();
            STATE.currentDemandExponent = STATE.targetDemandExponent;
            STATE.currentCapacitySlope = STATE.targetCapacitySlope;
            render(); return;
          }

          if (action === 'open-why-modal') {
            const id = act.getAttribute('data-why');
            STATE.recastMode = false;
            STATE.drivers.forEach(d => d.state = 'off');
            STATE.showTippingPoint = false;
            if (id === 'change') { STATE.drivers.forEach(d => { if (['platform_sprawl','update_velocity','packaging_burden','talent_drain'].includes(d.id)) d.state = 'normal'; }); }
            else if (id === 'now') { STATE.drivers.forEach(d => d.state = 'accelerating'); STATE.showTippingPoint = true; }
            else if (id === 'recast') { STATE.recastMode = true; }
            updateCurves(); requestAnimationFrame(animateCurves);
            STATE.openWhyModal = id; render(); return;
          }

          if (action === 'close-why') { STATE.openWhyModal = null; render(); return; }
          if (action === 'close-insight') { STATE.insightContent = null; STATE.highlightDriverId = null; render(); return; }
          if (action === 'why-nav') { STATE.openWhyModal = act.getAttribute('data-to'); render(); return; }

          if (action === 'toggle-card') {
            const id = act.getAttribute('data-card');
            const wasOpen = STATE.openCards[id];
            Object.keys(STATE.openCards).forEach(k => STATE.openCards[k] = false);
            STATE.openCards[id] = !wasOpen;
            if (STATE.openCards[id] && !STATE.visitedCards.includes(id)) STATE.visitedCards.push(id);
            render();
            if (STATE.openCards[id]) setTimeout(() => act.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200);
            return;
          }

          if (action === 'expand-all') {
            Object.keys(STATE.openCards).forEach(k => STATE.openCards[k] = true);
            STATE.visitedCards = ['core','onboarding','trust'];
            render(); return;
          }

          if (action === 'calculate-impact') { calculateImpact(); render(); return; }
          if (action === 'start-flow') { startFlow(); return; }
          if (action === 'reset-flow') { resetFlow(); return; }

          if (action === 'toggle-labels') {
            STATE.showLabels = !STATE.showLabels;
            toggleOverlay(); buildFlow(); return;
          }

          if (action === 'launch-icon') {
            act.classList.add('icon-launch');
            setTimeout(() => act.classList.remove('icon-launch'), 500);
            return;
          }

          if (action === 'open-editor') {
            STATE.modalOpen = true; STATE.editTab = 'change';
            STATE.editBuffers = { change:{intro:'',bullets:'',analyst:''}, now:{intro:'',bullets:'',analyst:''}, recast:{intro:'',bullets:'',analyst:''} };
            STATE.editChartBuffer = null;
            render();
            setTimeout(() => { try { window.lucide?.createIcons?.(); } catch{} }, 0);
            setTimeout(() => initEditor(), 0);
            return;
          }

          if (action === 'close-modal') { STATE.modalOpen = false; render(); return; }

          if (action === 'switch-edit-tab') {
            STATE.editTab = act.getAttribute('data-tab');
            render();
            setTimeout(() => { try { window.lucide?.createIcons?.(); } catch{} }, 0);
            return;
          }

          if (action === 'save-editor') {
            const fallback = STATE.defaultsCurrentState();
            const formData = readFields();
            const pick = (v, keep) => (typeof v === 'string' && v.trim()) ? v.trim() : keep;

            STATE.currentState = {
              change: { intro: pick(formData.change.intro, fallback.change.intro), bullets: parseLines(formData.change.bullets) || fallback.change.bullets, analyst: pick(formData.change.analyst, fallback.change.analyst) },
              now: { intro: pick(formData.now.intro, fallback.now.intro), bullets: parseLines(formData.now.bullets) || fallback.now.bullets, analyst: pick(formData.now.analyst, fallback.now.analyst) },
              recast: { intro: pick(formData.recast.intro, fallback.recast.intro), bullets: parseLines(formData.recast.bullets) || fallback.recast.bullets, analyst: pick(formData.recast.analyst, fallback.recast.analyst) }
            };

            const raw = STATE.editChartBuffer || readChartFieldsRaw();
            const fallbackChart = STATE.defaultsChartConfig();
            const cfg = raw?.chartConfig || {};
            STATE.chartConfig = {
              yAxis: pick(cfg.yAxis, STATE.chartConfig.yAxis || fallbackChart.yAxis),
              xAxis: pick(cfg.xAxis, STATE.chartConfig.xAxis || fallbackChart.xAxis),
              center: pick(cfg.center, STATE.chartConfig.center || fallbackChart.center),
              tipping: pick(cfg.tipping, STATE.chartConfig.tipping || fallbackChart.tipping)
            };

            const fallbackDrivers = STATE.defaultsDrivers();
            const dRaw = raw?.drivers || [];
            STATE.drivers.forEach((d, i) => {
              d.label = pick(dRaw[i]?.label, d.label || fallbackDrivers[i].label);
              if (typeof dRaw[i]?.bullets === 'string') {
                const b = parseLines(dRaw[i].bullets, 3);
                d.bullets = b.length === 3 ? b : (d.bullets || fallbackDrivers[i].bullets);
              }
            });

            saveDraft({ ...formData, chartConfig: {...STATE.chartConfig}, drivers: STATE.drivers.map(d=>({label:d.label,bullets:d.bullets.join('\n')})) });
            STATE.modalOpen = false; STATE.activeTab = 'challenge'; render(); return;
          }

          if (action === 'reset-editor') {
            clearDraft();
            STATE.chartConfig = STATE.defaultsChartConfig();
            STATE.drivers = STATE.defaultsDrivers();
            STATE.currentState = STATE.defaultsCurrentState();
            STATE.editChartBuffer = null;
            render(); return;
          }

          if (action === 'close-on-backdrop') {
            if (e.target.closest('[data-modal-inner]')) return;
            STATE.modalOpen = false; STATE.openWhyModal = null;
            STATE.insightContent = null; STATE.highlightDriverId = null;
            render(); return;
          }
        });

        root.addEventListener('input', (e) => {
          if (e.target?.id === 'calc-envs') { STATE.calcInputs.envs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'calc-changes') { STATE.calcInputs.changes = cleanNum(e.target.value); return; }
          if (e.target?.id === 'calc-time') { STATE.calcInputs.time = cleanNum(e.target.value); return; }
          if (e.target?.id === 'calc-salary') { STATE.calcInputs.salary = cleanNum(e.target.value); return; }

          const buf = e.target.closest('[data-action="edit-buffer"]');
          if (buf) {
            const key = buf.getAttribute('data-key');
            const sub = buf.getAttribute('data-subkey');
            if (STATE.editBuffers?.[key]) STATE.editBuffers[key][sub] = e.target.value;
          }

          if (STATE.modalOpen && STATE.editTab === 'chart') {
            STATE.editChartBuffer = readChartFieldsRaw();
          }
        });
      }

      /* ═══════════════════════════════════════════
         BOOT
         ═══════════════════════════════════════════ */

      STATE.drivers.forEach(d => d.state = 'accelerating');
      STATE.showTippingPoint = true;
      updateCurves();
      STATE.currentDemandExponent = STATE.targetDemandExponent;
      STATE.currentCapacitySlope = STATE.targetCapacitySlope;

      document.addEventListener('DOMContentLoaded', render);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && (STATE.modalOpen || STATE.openWhyModal || STATE.insightContent)) {
          STATE.modalOpen = false; STATE.openWhyModal = null;
          STATE.insightContent = null; STATE.highlightDriverId = null;
          render();
        }
      });
    </script>
  </body>
</html>
